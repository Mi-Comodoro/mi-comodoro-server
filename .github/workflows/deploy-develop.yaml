name: Deploy Backend NestJS
on:
  push:
    branches: [ develop ]
jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
      # Corregido: Volvemos a npm ci para una instalación rápida y exacta
      - name: Instalar dependencias de desarrollo
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          npm ci

      - name: Compilar backend
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          npm run build

      - name: Correr migraciones
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          cp /var/www/intranet/mi-comodoro-server/.env .env
          npm run migration:run

      - name: Crear carpeta destino
        run: mkdir -p /var/www/intranet/mi-comodoro-server

      - name: Limpiar deploy anterior
        run: |
          rm -rf /var/www/intranet/mi-comodoro-server/dist

      - name: Copiar archivos necesarios
        run: |
          cp -r dist /var/www/intranet/mi-comodoro-server/
          cp package.json /var/www/intranet/mi-comodoro-server/
          cp package-lock.json /var/www/intranet/mi-comodoro-server/
          cp ecosystem.config.js /var/www/intranet/mi-comodoro-server/

      # Corregido: Se añade --ignore-scripts para evitar el fallo de Husky en producción
      - name: Instalar dependencias produccion
        working-directory: /var/www/intranet/mi-comodoro-server
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          npm ci --omit=dev --ignore-scripts

      - name: Reiniciar backend
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          cd /var/www/intranet/mi-comodoro-server
          pm2 delete mi-comodoro-server || true
          pm2 start ecosystem.config.js
          pm2 save
