name: Deploy Backend NestJS

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22

      # Este paso ahora funcionará porque ya subiste el package-lock.json a Git
      - name: Instalar dependencias de desarrollo
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          npm install --no-audit --no-fund

      - name: Compilar backend
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          npm run build

      - name: Crear carpeta destino
        run: mkdir -p /var/www/intranet/mi-comodoro-server

      - name: Limpiar deploy anterior
        run: |
          rm -rf /var/www/intranet/mi-comodoro-server/dist

      - name: Copiar archivos necesarios
        run: |
          cp -r dist /var/www/intranet/mi-comodoro-server/
          cp package.json /var/www/intranet/mi-comodoro-server/
          cp package-lock.json /var/www/intranet/mi-comodoro-server/

      # Corregido: Cargamos NVM antes de ejecutar el comando en el directorio destino
      - name: Instalar dependencias produccion
        working-directory: /var/www/intranet/mi-comodoro-server
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          npm ci --omit=dev

      # Corregido: Cargamos NVM para que reconozca el comando pm2 en el entorno global
      - name: Reiniciar backend
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          cd /var/www/intranet/mi-comodoro-server
          pm2 restart mi-comodoro-server || pm2 start dist/main.js --name "mi-comodoro-server"
          pm2 save
